server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS. Resolve backend at request time so recreated containers with
    # new IPs do not leave nginx proxying to a stale upstream address.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream backend:8000;

    # 文件上传体积上限 (默认 1m 太小,上传 PDF / 音频会 413)
    # 长 PDF / 高码率音频可能上百 MB,500m 给足余量
    client_max_body_size 500m;

    # API 反向代理
    location /api/ {
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE 流式响应
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        # 大文件上传/解析时间放宽
        client_body_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /health {
        proxy_pass http://$backend_upstream;
    }

    # ESM 模块(.mjs):nginx 默认 mime.types 没这个映射,
    # 浏览器收到 application/octet-stream 会按 spec 拒绝执行。
    # 典型踩坑:pdfjs-dist 的 pdf.worker.min.mjs。
    location ~* \.mjs$ {
        types { application/javascript mjs; }
        try_files $uri =404;
    }

    # Vue Router history 模式
    location / {
        try_files $uri $uri/ /index.html;
    }
}
