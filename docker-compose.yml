services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"           # 暴露给宿主机,便于本地裸跑 backend 时连接

  # ── Milvus standalone(官方 3 件套) ─────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${LOCAL_NOTEBOOK_DATA_DIR:-./local-notebook-data}/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ${LOCAL_NOTEBOOK_DATA_DIR:-./local-notebook-data}/minio:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.5.6
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${LOCAL_NOTEBOOK_DATA_DIR:-./local-notebook-data}/milvus:/var/lib/milvus
    ports:
      - "19530:19530"         # 暴露给宿主机,便于本地裸跑 backend 时连接
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
  # ───────────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      milvus:
        condition: service_healthy
    user: "${CURRENT_UID:-0}:${CURRENT_GID:-0}"
    environment:
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-please-change-this-in-production}
      - DATABASE_URL=sqlite+aiosqlite:////app/data/local_notebook.db
      - MILVUS_URI=http://milvus:19530
      - UPLOAD_DIR=/app/data/uploads
    volumes:
      - ${LOCAL_NOTEBOOK_DATA_DIR:-./local-notebook-data}:/app/data
    ports:
      - "8081:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"